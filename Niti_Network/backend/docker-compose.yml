version: "3.9"

# ═══════════════════════════════════════════════════════════════
# NitiLedger — Master Docker Compose (Sprint 1)
# Run: docker-compose up --build (from backend/ directory)
# ═══════════════════════════════════════════════════════════════

networks:
  niti-net:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
  couchdb_data:
  grafana_data:
  prometheus_data:
  milvus_data:
  etcd_data:

services:

  # ─── PostgreSQL 15 ─────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: niti-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: niti_ledger
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - niti-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d niti_ledger"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Keycloak 23 ───────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: niti-keycloak
    restart: unless-stopped
    command: start-dev
    environment:
      KC_DB: dev-file
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8080
    ports:
      - "8080:8080"
    networks:
      - niti-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ─── MinIO (Object Storage) ────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: niti-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - niti-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─── CouchDB 3 (Fabric world-state) ───────────────────────
  couchdb:
    image: couchdb:3.3
    container_name: niti-couchdb
    restart: unless-stopped
    environment:
      COUCHDB_USER: admin
      COUCHDB_PASSWORD: adminpw
    ports:
      - "5984:5984"
    volumes:
      - couchdb_data:/opt/couchdb/data
    networks:
      - niti-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5984/_up"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─── etcd (Milvus dependency) ──────────────────────────────
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: niti-etcd
    restart: unless-stopped
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command: >
      etcd
      --advertise-client-urls=http://etcd:2379
      --listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
    networks:
      - niti-net
    volumes:
      - etcd_data:/etcd

  # ─── Milvus v2.3 (Vector DB for Biometrics) ────────────────
  milvus:
    image: milvusdb/milvus:v2.3.12
    container_name: niti-milvus
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: minio
      MINIO_SECRET_ACCESS_KEY: minio123
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      - etcd
      - minio
    networks:
      - niti-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s

  # ─── FastAPI Backend ────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: niti-backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      minio:
        condition: service_healthy
      milvus:
        condition: service_healthy
    networks:
      - niti-net
    volumes:
      - ./app:/app/app  # hot-reload in dev

  # ─── Next.js Frontend ──────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: niti-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_KEYCLOAK_URL: http://localhost:8080
      NEXT_PUBLIC_KEYCLOAK_REALM: niti-ledger
      NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: frontend-client
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - niti-net

  # ─── Prometheus ────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: niti-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - niti-net

  # ─── Grafana ───────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: niti-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SERVER_HTTP_PORT: 3001
    ports:
      - "3001:3001"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - niti-net
