name: Chaincode CI

on:
  push:
    branches: [main, develop]
    paths:
      - "chaincode/**"
  pull_request:
    branches: [main]
    paths:
      - "chaincode/**"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go 1.21
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: true
          cache-dependency-path: chaincode/go-contract/go.sum

      - name: Download dependencies
        working-directory: chaincode/go-contract
        run: go mod download

      - name: Vet
        working-directory: chaincode/go-contract
        run: go vet ./...

      - name: Run tests
        working-directory: chaincode/go-contract
        run: go test ./... -v -race
